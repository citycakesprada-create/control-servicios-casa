<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Recibo Gas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <h1>🔥 Ingresar Recibo de Gas</h1>

        {% if guardado %}
            <div class="alerta-ok">✅ Recibo guardado correctamente</div>
        {% endif %}

        <div class="lista">
            <form method="POST">
                <div class="campo">
                    <label>Fecha del recibo</label>
                    <input type="date" name="fecha" required>
                </div>
                <div class="campo">
                    <label>Grupo</label>
                    <select name="grupo" onchange="cambiarReferencia(this)" style="width:100%; padding:12px; border-radius:10px; font-size:16px; background:rgba(255,255,255,0.2); color:white; border:none;">
                        <option value="1" data-ref="62314541">Grupo 1 (101, 401, 402, 501) — Ref: 62314541</option>
                        <option value="2" data-ref="61788824">Grupo 2 (201, 202, 301, 302) — Ref: 61788824</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Referencia de pago</label>
                    <input type="text" name="referencia" id="referencia" value="62314541" readonly 
                           style="opacity:0.7;">
                        </div>
                <div class="campo">
                    <label>Consumo total m³</label>
                    <input type="number" name="consumo_total" required>
                </div>
                <div class="campo">
                    <label>Valor total recibo ($)</label>
                    <input type="number" step="0.01" name="valor_total" required>
                </div>
                <div class="campo">
                    <label>Valor por m³ ($)</label>
                    <input type="number" step="0.01" name="valor_m3" required>
                </div>
                <div class="campo">
                    <label>Observaciones</label>
                    <input type="text" name="observaciones">
                </div>
                <button type="submit">Guardar recibo</button>
            </form>
        </div>

        <br>
        <a href="/">← Volver al inicio</a>
    </div>

<script>
    function cambiarReferencia(select) {
        const ref = select.options[select.selectedIndex].getAttribute('data-ref');
        document.getElementById('referencia').value = ref;
    }
</script>
</body>
</html>
