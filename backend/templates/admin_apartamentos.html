<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Administrar Inquilinos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <h1>🏢 Administrar Apartamentos e Inquilinos</h1>

        <div style="display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 30px;">
            <!-- FORMULARIO NUEVO APARTAMENTO -->
            <div class="lista" style="flex: 1; min-width: 300px;">
                <h2>➕ Agregar Apartamento</h2>
                <form method="POST">
                    <div class="campo">
                        <label for="numero">Número de Apartamento</label>
                        <input type="text" id="numero" name="numero" required placeholder="Ej: 102">
                    </div>
                    <div class="campo">
                        <label for="nombre_inquilino">Nombre del Inquilino</label>
                        <input type="text" id="nombre_inquilino" name="nombre_inquilino" required placeholder="Nombre completo">
                    </div>
                    <div class="campo">
                        <label for="telefono">Teléfono / Celular</label>
                        <input type="text" id="telefono" name="telefono" required placeholder="Ej: 3001234567">
                    </div>
                    <button type="submit">Guardar Apartamento</button>
                </form>
            </div>

            <!-- TABLA DE APARTAMENTOS EXISTENTES -->
            <div class="lista" style="flex: 2; min-width: 450px;">
                <h2>Apartamentos Registrados</h2>
                <table class="tabla-cobros">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Inquilino</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for a in apartamentos %}
                        <tr>
                            <td>{{ a.numero }}</td>
                            <td>{{ a.nombre_inquilino }}</td>
                            <td>{{ a.telefono }}</td>
                            <td>
                                <div style="display: flex; gap: 8px;">
                                    <a href="/admin/editar_apartamento/{{ a.id }}" class="btn-editar" style="padding: 5px 10px; font-size: 14px;">✏️ Editar</a>
                                    <a href="/admin/eliminar_apartamento/{{ a.id }}" class="btn-editar" style="background: rgba(220, 53, 69, 0.4); border-color: rgba(220, 53, 69, 0.6); padding: 5px 10px; font-size: 14px;" onclick="return confirm('¿Seguro que deseas eliminar este apartamento?');">🗑️ Borrar</a>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <br>
        <a href="/">← Volver al inicio</a>
    </div>
</body>
</html>
