<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Modificar Recibo de Gas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor" style="max-width: 600px; margin: auto;">
        <h1>✏️ Modificar Recibo de Gas</h1>
        <h2 style="text-align: center;">Fecha del Recibo: {{ recibo.fecha }} — Grupo: {{ recibo.grupo }}</h2>

        <div class="lista">
            <form method="POST">
                <div class="campo">
                    <label for="fecha">Fecha Facturación</label>
                    <input type="date" id="fecha" name="fecha" value="{{ recibo.fecha }}" required>
                </div>
                <div class="campo">
                    <label for="grupo">Grupo</label>
                    <input type="number" id="grupo" name="grupo" value="{{ recibo.grupo }}" min="1" max="2" required readonly>
                </div>
                <div class="campo">
                    <label for="referencia">Referencia de Pago</label>
                    <input type="text" id="referencia" name="referencia" value="{{ recibo.referencia }}" required>
                </div>
                <div class="campo">
                    <label for="consumo_total">Consumo Total (m³)</label>
                    <input type="number" id="consumo_total" name="consumo_total" value="{{ recibo.consumo_total }}" required>
                </div>
                <div class="campo">
                    <label for="valor_total">Valor Total Facturado ($)</label>
                    <input type="number" step="0.01" id="valor_total" name="valor_total" value="{{ recibo.valor_total }}" required>
                </div>
                <div class="campo">
                    <label for="valor_m3">Valor Unitario m³ ($)</label>
                    <input type="number" step="0.01" id="valor_m3" name="valor_m3" value="{{ recibo.valor_m3 }}" required>
                </div>
                <div class="campo">
                    <label for="observaciones">Observaciones</label>
                    <input type="text" id="observaciones" name="observaciones" value="{{ recibo.observaciones or '' }}">
                </div>
                
                <div style="text-align: center; margin-top: 25px; display: flex; gap: 15px; justify-content: center;">
                    <button type="submit">Guardar y Recalcular</button>
                    <a href="/cobros_gas?grupo={{ recibo.grupo }}" class="btn-editar" style="padding: 13px 30px; font-weight: bold; line-height: 1.2;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
